# Server
server.port=8080
spring.application.name=ClyvoPet

# Oracle DataSource - usa variaveis de ambiente do Docker
# Se a variavel nao existir, usa o valor local como fallback
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@localhost:1521:orcl}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:RM565760}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:150606}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Cache
spring.cache.type=simple

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.packages-to-scan=br.com.fiap.ClyvoPet

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
